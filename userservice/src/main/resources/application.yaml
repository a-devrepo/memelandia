server:
  port: 8082
  servlet:
    context-path: /user-service
  forward-headers-strategy: framework

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://user-db:5432/user_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    template:
      observation-enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  instance:
    prefer-ip-address: true
    health-check-url-path: /user-service/actuator/health
    status-page-url-path: /user-service/actuator/info
    hostname: user-service
    instance-id: ${spring.application.name}:${server.port}

  client:
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health,info,gateway"
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
  logging:
    export:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
    export:
      enabled: true
      zipkin:
        enabled: true
        endpoint: "http://zipkin:9411/api/v2/spans"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    com.nca.userserive: DEBUG

info:
  app:
    name: ${spring.application.name}
    description: "Serviço de gerenciamento de usuários"
    version: "1.0.0-SNAPSHOT"
  contact:
    email: "suporte@nca.com.br"
    department: "Desenvolvimento"