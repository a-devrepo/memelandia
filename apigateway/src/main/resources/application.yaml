server:
  port: 8081

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          enabled: true
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/user-service/**

            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/user-service/v3/api-docs/**

            - id: meme-service
              uri: lb://meme-service
              predicates:
                - Path=/meme-service/**

            - id: meme-service-docs
              uri: lb://meme-service
              predicates:
                - Path=/meme-service/v3/api-docs/**


springdoc:
  swagger-ui:
    urls:
      - name: "User Service"
        url: /user-service/v3/api-docs
      - name: "Meme Service"
        url: /meme-service/v3/api-docs
    disable-swagger-default-url: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
    fetch-registry: true
    register-with-eureka: true
    disable-delta: true
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health,info,gateway"
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
  logging:
    export:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
    export:
      enabled: true
      zipkin:
        enabled: true
        endpoint: "http://zipkin:9411/api/v2/spans"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.gateway.filter.headers.observation: INFO
    reactor.netty: INFO
    com.nca.apigateway: DEBUG

info:
  app:
    name: ${spring.application.name}
    description: "Api gateway"
    version: "1.0.0-SNAPSHOT"
  contact:
    email: "suporte@nca.com.br"
    department: "Desenvolvimento"