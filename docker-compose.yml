services:
  # O Serviço que você acabou de criar
  discovery-server:
    build: ./discoveryserverapp
    container_name: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Infraestrutura que os próximos serviços vão precisar
  user-db:
    image: postgres:17
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  meme-db:
    image: postgres:17
    container_name: meme-db
    environment:
      POSTGRES_DB: meme_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: meme-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
