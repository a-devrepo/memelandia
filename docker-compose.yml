services:
  discovery-server:
    build: ./discoveryserverapp
    container_name: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meme-network

  user-db:
    image: postgres:17
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    networks:
      - meme-network

  meme-db:
    image: postgres:17
    container_name: meme-db
    environment:
      POSTGRES_DB: meme_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    networks:
      - meme-network

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: meme-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - meme-network
      
  api-gateway:
    build: ./apigateway
    container_name: api-gateway
    restart: always
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - meme-network
  
  zipkin:
    image: openzipkin/zipkin
    container_name: meme-zipkin
    ports:
      - "9411:9411"
    networks:
      - meme-network

networks:
  meme-network:
    driver: bridge